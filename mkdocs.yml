site_name: Doxa
site_description: A YAML-driven multi-agent simulation platform for economic and social systems
site_author: Vincenzo Manto
site_url: https://vincenzomanto.github.io/Doxa/
repo_name: VincenzoManto/Doxa
repo_url: https://github.com/VincenzoManto/Doxa
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: false
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - tables
  - attr_list
  - md_in_html
  - footnotes
  - toc:
      permalink: true

plugins:
  - search

validation:
  links:
    not_found: warn
    absolute_links: warn
    unrecognized_links: warn

nav:
  - Home: index.md
  - Getting Started:
    - Quick Start: quickstart.md
    - Scenarios: scenarios.md
  - Reference:
    - Architecture: architecture.md
    - YAML Reference: yaml-reference.md
    - API Reference: api.md
  - How To: how-to.md
  - Research: paper.md
  - Community:
    - Contributing: contributing.md
    - Changelog: changelog.md
