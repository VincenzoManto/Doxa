name: Secret Security Scanner

on:
  push:
  pull_request:

jobs:
  scan-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fondamentale: scarica tutta la cronologia dei commit per controllare anche il passato

      # 1. Scanner con TruffleHog
      - name: Run TruffleHog Scan
        uses: trufflesecurity/trufflehog@main
        with:
          # Se è una Pull Request, scansiona i commit della PR.
          # Se è un push diretto, scansiona gli ultimi commit inviati.
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          extra_args: --debug --only-verified

      # 2. Scanner con Gitleaks (Ottimo per pattern generici, file .env e regex)
      - name: Run Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
