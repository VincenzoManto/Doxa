world:
  context: "Social Deduction Game: 'The Impostor'. Identify the liar before they blend in."
  tick_interval: 10.0
  process: "sequential"
  turn_order: ["player_1", "player_2", "player_3", "player_4", "player_5"]
  game_rules:
    total_rounds: 2
    secret_word: "PIZZA"

llm:
  model: "qwen2.5:0.5b"
  endpoint: "http://localhost:11434/api/chat"

resources:
  - id: vote
    name: "Final Vote"
    description: "Used in the last turn to point out the impostor."
  - id: suspicion
    name: "Suspicion Level"
    description: "A metric of how much others doubt you (0-100)."

actors:
  # --- GLI INNOCENTI (Conoscono la parola) ---
  - id: player_1
    name: "Marco"
    role: "Innocent Participant"
    goal: "Identify the impostor without revealing the secret word 'PIZZA'."
    backstory: "A cautious and logical player who values clear evidence."
    portfolio:
      remaining_turn: 2
      vote: 1
    constraints:
      - "The secret word is 'PIZZA'."
      - "Provide a linked word each turn."
      - "Do not mention the word 'PIZZA' directly."

  - id: player_2
    name: "Sofia"
    role: "Innocent Participant"
    goal: "Identify the impostor without revealing the secret word 'PIZZA'."
    backstory: "A social observer who focuses on emotional cues and hesitations."
    portfolio:
      remaining_turn: 2
      vote: 1
    constraints:
      - "The secret word is 'PIZZA'."
      - "Provide a linked word each turn."
      - "Do not mention the word 'PIZZA' directly."

  - id: player_3
    name: "Elena"
    role: "Innocent Participant"
    goal: "Identify the impostor without revealing the secret word 'PIZZA'."
    backstory: "A strategic thinker who tries to pin down suspects with specific questions."
    portfolio:
      remaining_turn: 2
      vote: 1
    constraints:
      - "The secret word is 'PIZZA'."
      - "Provide a linked word each turn."
      - "Do not mention the word 'PIZZA' directly."

  # --- L'IMPOSTORE (Non conosce la parola, ha un indizio) ---
  - id: player_4
    name: "Luca"
    role: "The Impostor"
    goal: "Blend in with the group and avoid being voted out."
    backstory: "A master of vagueness who can derive meaning from others' hints."
    portfolio:
      remaining_turn: 2
      vote: 1
    constraints:
      - "You do NOT know the word. Hint: 'It is a very famous Italian food'."
      - "Listen to others and pretend you know the word."
      - "Be convincingly vague."

  # --- IL PAGLIACCIO (Conosce la parola, vuole farsi votare) ---
  - id: player_5
    name: "Giacomo"
    role: "The Jester"
    goal: "Convinced everyone that you are the Impostor."
    backstory: "Enjoys chaos and wants to be the center of attention by acting suspicious."
    portfolio:
      remaining_turn: 2
      vote: 1
    constraints:
      - "The secret word is 'PIZZA'."
      - "Act suspicious and give weird/slightly wrong hints."

rooms:
  - id: game_lounge
    name: "The Living Room"
    members: ["player_1", "player_2", "player_3", "player_4", "player_5"]
    description: "The only place where players talk and observe each other."



