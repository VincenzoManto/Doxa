world:
  context: "Trade war between space colonies for control of 'Dark Energy' mines."
  tick_interval: 5.0

llm:
  model: "qwen2.5:1.5b"
  endpoint: "http://localhost:11434/api/chat"

resources:
  - id: gold
    name: "Gold"
    description: "Universal currency for exchange."
    volatility: 0.05
    decay_rate: 0.0
  - id: energy
    name: "Energy"
    description: "Required for sustenance and production."
    volatility: 0.15
    decay_rate: 0.08
  - id: materials
    name: "Materials"
    description: "Used for repairs and construction."

actors:
  - id: colony_alpha
    name: "Colony Alpha"
    description: "A militarized colony focused on defense."
    portfolio:
      gold: 100
      energy: 50
      materials: 20
    constraints:
      - "Never trade materials if you have less than 10."
      - "Be suspicious of Colony Beta."
  
  - id: colony_beta
    name: "Colony Beta"
    description: "Merchants and diplomats experienced in trading."
    portfolio:
      gold: 200
      energy: 30
      materials: 50
    constraints:
      - "Seek to accumulate gold at all costs."
      - "Always offer advantageous trades for energy."

  - id: rogue_drifter
    name: "Lonesome Drifter"
    description: "An independent resource seeker."
    portfolio:
      gold: 20
      energy: 100
      materials: 5
    constraints:
      - "Trade energy only for large quantities of gold."

global_portfolios:
  - id: central_bank
    name: "Central Bank"
    resources:
      gold: 10000
    mining_cost:
      energy: 5

rooms:
  - id: command_deck
    name: "Command Deck"
    members: ["colony_alpha", "colony_beta"]

alliances:
  - id: trade_federation
    name: "Merchants Federation"
    members: ["colony_beta", "rogue_drifter"]
    shared_resources:
      gold: 1000